<div class="container" style="width:100%; height:100%;">
  <div class="content" style="width:100%; height:100%;">
    <mat-drawer-container style="width:100%; height:100%;">
      <mat-drawer mode="side" opened><app-menu></app-menu></mat-drawer>
      <mat-drawer-content>
        <app-menu2></app-menu2>

        <main class="noticias-page">

          <!-- Hero header -->
          <header class="noticias-hero">
            <span class="hero-eyebrow">Fashion Intel</span>
            <h1 class="hero-title">Últimas Tendencias</h1>
            <p class="hero-sub">Lo más relevante del mundo de la moda, curado para ti</p>
          </header>

          <!-- Loading -->
          <div class="loading-state" *ngIf="trends.length === 0">
            <div class="loading-spinner"></div>
            <p>Cargando tendencias...</p>
          </div>

          <!-- Grid -->
          <div class="trends-grid" *ngIf="trends.length > 0">
            <article
              *ngFor="let trend of trends; let i = index"
              class="trend-card"
              [class.trend-card--featured]="i === 0">

              <div class="card-image-wrap">
                <img [src]="trend.image" [alt]="trend.title" class="card-image">
                <span class="card-tag">Tendencia</span>
              </div>

              <div class="card-body">
                <h2 class="card-title">{{ trend.title }}</h2>
                <p class="card-desc">{{ trend.description }}</p>
                <a [href]="trend.link" target="_blank" rel="noopener" class="card-cta">
                  Leer más
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                  </svg>
                </a>
              </div>

            </article>
          </div>

        </main>
      </mat-drawer-content>
    </mat-drawer-container>
  </div>
</div>
