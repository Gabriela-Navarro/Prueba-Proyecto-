<app-menu3></app-menu3>
<div class="fondo">
<div class="arreglar">
    <br>
    <h1>Listado de Zapatos</h1>
        <table mat-table [dataSource]="dataSource" class="table">
            <ng-container matColumnDef="id_post">
            <th mat-header-cell *matHeaderCellDef>ID Post</th>
            <td mat-cell *matCellDef="let element">{{element.id_post}}</td>
            </ng-container>

            <ng-container matColumnDef="descripcion">
              <th mat-header-cell *matHeaderCellDef>Descripcion</th>
              <td mat-cell *matCellDef="let element"> {{element.descripcion}} </td>
              </ng-container>

            <ng-container matColumnDef="imagen">
            <th mat-header-cell *matHeaderCellDef>Imagen</th>
            <td mat-cell *matCellDef="let element"><img src="../../../assets/img/{{element.imagen}}"></td>
            </ng-container>


            <ng-container matColumnDef="usuario">
            <th mat-header-cell *matHeaderCellDef>usuario</th>
            <td mat-cell *matCellDef="let element"> {{element.usuario}} </td>
            </ng-container>


            <ng-container matColumnDef="name_categoria">
            <th mat-header-cell *matHeaderCellDef>Nombre categoria</th>
            <td mat-cell *matCellDef="let element"> {{element.name_categoria}} </td>
            </ng-container>

            <ng-container matColumnDef="modificar">
                <th mat-header-cell *matHeaderCellDef>Modificar</th>
                <td mat-cell *matCellDef="let element"><button  class ="example-form" mat-button (click)=" modificarTendecias(element.id_post)"><img class="imgs" src="https://cdn-icons-png.flaticon.com/512/1159/1159633.png"></button></td>
            </ng-container>

            <ng-container matColumnDef="borrar">
                <th mat-header-cell *matHeaderCellDef>Borrar</th>
                <td mat-cell *matCellDef="let element"><button  class ="example-form" mat-button (click)="borrarTendencia(element.id_post)"><img class="imgs" src="https://cdn-icons-png.flaticon.com/512/88/88666.png"></button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    <br><br>
</div>
</div>
