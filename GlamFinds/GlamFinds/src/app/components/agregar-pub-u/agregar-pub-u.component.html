<div class="screen">
  <div class="screen-body">

    <!-- Preview (left) -->
    <div class="screen-body-item left">
      <div class="app-title">
        <span class="section-tag">Nueva Publicación</span>
        <p class="section-sub">Vista previa</p>
        <div *ngIf="imgUrl">
          <ng-container *ngIf="isImage(imgUrl); else videoBlock">
            <div class="preview-box">
              <img [src]="imgUrl" alt="Imagen Subida">
            </div>
          </ng-container>
          <ng-template #videoBlock>
            <div class="preview-box">
              <video controls autoplay [muted]="true" loop>
                <source [src]="imgUrl" type="video/mp4">
                Tu navegador no soporta la reproducción de video.
              </video>
            </div>
          </ng-template>
        </div>
        <div class="preview-placeholder" *ngIf="!imgUrl">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#C4A882" stroke-width="1.2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <p>Sin imagen</p>
        </div>
      </div>
    </div>

    <!-- Form (right) -->
    <div class="screen-body-item">
      <div class="form-section-header">
        <span class="form-section-tag">Post General</span>
      </div>
      <div class="row" [formGroup]="formGroups">
        <div class="app-form">

          <label class="field-label">Descripción</label>
          <textarea
            placeholder="Escribe una descripción..."
            class="app-form-control"
            formControlName="descripcion"
            rows="4"
          ></textarea>

          <label class="field-label">Imagen / Video</label>
          <label class="file-upload-label">
            <input
              type="file"
              class="file-input"
              formControlName="imagen"
              accept="image/*,video/*"
              (change)="imagenSelect($event)"
            >
            <span class="file-upload-text">Seleccionar archivo</span>
            <span class="file-upload-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </span>
          </label>

          <label class="field-label">Categoría</label>
          <div class="select-wrapper">
            <select formControlName="categoria" class="app-form-control">
              <option value="1">Tendencias</option>
              <option value="2">Ropa</option>
              <option value="3">Maquillaje</option>
              <option value="4">Accesorios</option>
              <option value="5">Zapatos</option>
            </select>
          </div>

          <div class="app-form-group buttons">
            <button type="button" class="app-form-button" (click)="guardarPostG()">
              Publicar
            </button>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>
