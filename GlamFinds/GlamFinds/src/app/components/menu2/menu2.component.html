<div class="app">
  <header class="topbar">

    <!-- Brand -->
    <div class="topbar-brand">
      <img class="brand-logo" src="../../../assets/logo.png" alt="GlamFinds">
      <span class="brand-name">GlamFinds</span>
    </div>

    <!-- Search -->
    <div class="topbar-search">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" type="text" placeholder="Buscar looks, prendas, estilos...">
    </div>

    <!-- Nav tabs -->
    <nav class="topbar-tabs">
      <a routerLink="/home" class="tab tab--active">Para ti</a>
      <a href="#"           class="tab">Siguiendo</a>
      <a routerLink="/home" class="tab">Tendencias</a>
    </nav>

    <!-- Actions -->
    <div class="topbar-actions">

      <div class="icon-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="icon-pip"></span>
      </div>

      <div class="icon-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>

      <button class="publish-btn" (click)="openAgregar()">+ Publicar</button>

      <div class="avatar-btn" [matMenuTriggerFor]="menu" #menuTrigger>
        <img *ngIf="user.imagen" src="../../../assets/img/{{user.imagen}}" alt="avatar">
        <span *ngIf="!user.imagen" class="avatar-initials">
          {{ user.nombre ? user.nombre[0] : 'U' }}
        </span>
      </div>

      <mat-menu #menu="matMenu">
        <div class="dropdown-modal">
          <button class="btn" mat-menu-item (click)="cerrarSesion()">Cerrar Sesión</button>
        </div>
      </mat-menu>

    </div>
  </header>
</div>
